services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PUBLIC_DEPLOYMENT: "true"
      INTERVIEW_DEMO: "true"
      BIND_HOST: 0.0.0.0
      PORT: "3000"
      ALLOWED_HOSTS: ${DOMAIN:?Set DOMAIN in deploy/tencent/tencent.env}
      DB_PATH: /tmp/ai-memory-museum-lighthouse-demo.sqlite
      MEDIA_ROOT: /tmp/ai-memory-museum-lighthouse-demo-media
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=536870912,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: "1.50"
    pids_limit: 128
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "const http=require('node:http');const req=http.get({host:'127.0.0.1',port:3000,path:'/api/health',headers:{Host:process.env.ALLOWED_HOSTS}},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(3000,()=>{req.destroy();process.exit(1)})"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    init: true
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN in deploy/tencent/tencent.env}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in deploy/tencent/tencent.env}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=67108864,mode=1777
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    cpus: "0.50"
    pids_limit: 64
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"
    networks:
      - edge
      - backend

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
  backend:
    internal: true
