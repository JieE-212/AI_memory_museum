    <title>时屿暂时离线</title>

  <body class="offline-page">
    <main class="offline-card" aria-labelledby="offlineTitle">
      <img class="offline-mark" src="/assets/time-isle-icon.svg" alt="" width="76" height="76" />
      <p class="offline-eyebrow">TIME ISLE · OFFLINE</p>
      <h1 id="offlineTitle">时屿暂时无法连接</h1>
      <p>为了不把私人记忆复制进浏览器缓存，离线页不会展示馆藏、照片、声音或导出内容。</p>
      <p>如果你使用本地版，请先确认时屿服务仍在运行；如果你访问公开 Demo，请恢复网络后重试。</p>
      <a class="offline-retry" href="/">重新连接</a>
      <small>已经安装到设备的时屿仍遵守同一数据边界。</small>
    </main>
  </body>
